<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Futsal Expense Manager — split turf fees with your squad." />
    <title>Futsal Expense Manager</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

    <!-- HEADER -->
    <header class="app-header">
      <h1>⚽ Futsal Expense Manager</h1>
      <p class="tagline">Track squad fees. No more arguments.</p>
    </header>

    <!-- FEE INPUT SECTION -->
    <section class="fee-section">
      <label for="turf-fee">Total Turf Fee (Rs.)</label>
      <input
        type="number"
        id="turf-fee"
        placeholder="e.g. 1200"
        min="0"
      />
    </section>

    <!-- ADD PLAYER SECTION -->
    <section class="player-section">
      <div class="add-player-row">
        <input
          type="text"
          id="player-name"
          placeholder="Player name"
          maxlength="30"
        />
        <button id="add-player-btn">Add Player</button>
      </div>

      <!-- PLAYER LIST -->
      <ul id="player-list">
        <!-- Players injected by JS -->
      </ul>
    </section>

    <!-- SUMMARY SECTION -->
    <section class="summary-section">
      <div class="summary-card">
        <span>Per Person</span>
        <strong id="per-person">Rs. 0</strong>
      </div>
      <div class="summary-card green">
        <span>Collected</span>
        <strong id="total-collected">Rs. 0</strong>
      </div>
      <div class="summary-card red">
        <span>Due</span>
        <strong id="total-due">Rs. 0</strong>
      </div>
    </section>

    <script src="js/app.js"></script>

  </body>
</html>
